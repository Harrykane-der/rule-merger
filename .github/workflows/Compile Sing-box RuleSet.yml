name: Build Sing-box Rule Sets (Pro Release)

on:
  push:
    branches: [main, master]
    paths:
      - "local/**/*.json"

  pull_request:
    branches: [main, master]
    paths:
      - "local/**/*.json"

  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

concurrency:
  group: singbox-rule-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sing-box
        run: |
          set -e
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.36/sing-box-1.14.0-alpha.36-linux-amd64.tar.gz -O sb.tar.gz
          tar -xzf sb.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sing-box version

      - name: Build rules
        run: |
          set -e

          BUILD_DIR="/tmp/singbox-build"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          mapfile -d '' files < <(find local -type f -name "*.json" -print0)

          echo "JSON files: ${#files[@]}"
          if [ ${#files[@]} -eq 0 ]; then
            echo "No rule files"
            exit 1
          fi

          for f in "${files[@]}"; do
            out="$BUILD_DIR/${f#local/}"
            out="${out%.json}.srs"

            mkdir -p "$(dirname "$out")"

            echo "compile: $f -> $out"

            sing-box rule-set compile \
              --output "$out" \
              "$f"
          done

          find "$BUILD_DIR" -type f -name "*.srs" | sort

      - name: Publish to release branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BUILD_DIR="/tmp/singbox-build"

          git fetch origin

          # 切换 release 分支（不存在则创建）
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout release
            git pull origin release
          else
            git checkout -b release
          fi

          # 清空旧文件（保留 git）
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          # 写入新规则
          cp -r "$BUILD_DIR"/. .

          # 版本标记
          VERSION="$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD || echo unknown)"
          echo "$VERSION" > VERSION

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update rule sets $VERSION"
          git push origin release
