name: Unified Rule Build (Singbox + Mihomo)

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "local/**/*.json"
      - "rule_merger.py"
      - "**/*.py"

permissions:
  contents: write

concurrency:
  group: unified-rule-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # =========================
      # Mihomo
      # =========================
      - name: Install Mihomo
        run: |
          set -e
          LATEST_TAG=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/latest/download/version.txt)
          curl -fsSL -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_TAG}/mihomo-linux-amd64-${LATEST_TAG}.gz
          gunzip mihomo.gz
          sudo mv mihomo /usr/local/bin/
          chmod +x /usr/local/bin/mihomo
          mihomo -v

      # =========================
      # Sing-box
      # =========================
      - name: Install sing-box
        run: |
          set -e
          VERSION=1.14.0-alpha.36
          curl -fsSL -o sb.tar.gz https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xzf sb.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

      # =========================
      # Build Sing-box rules
      # =========================
      - name: Build Sing-box rules
        run: |
          set -e

          SB_OUT="/tmp/release/singbox"
          rm -rf "$SB_OUT"
          mkdir -p "$SB_OUT"

          mapfile -d '' files < <(find local -type f -name "*.json" -print0)

          echo "Sing-box rules: ${#files[@]}"

          for f in "${files[@]}"; do
            out="$SB_OUT/${f#local/}"
            out="${out%.json}.srs"

            mkdir -p "$(dirname "$out")"

            echo "compile: $f -> $out"

            sing-box rule-set compile \
              --output "$out" \
              "$f"
          done

          date -u +"%Y%m%d-%H%M%S" > "$SB_OUT/VERSION"

      # =========================
      # Mihomo rule merger
      # =========================
      - name: Run Mihomo merger
        run: |
          set -e

          export OUTPUT_DIR="/tmp/release/mihomo"
          mkdir -p "$OUTPUT_DIR"

          python rule_merger.py

      # =========================
      # Publish to release branch
      # =========================
      - name: Publish to release branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout release
            git pull origin release
          else
            git checkout -b release
          fi

          # 清空旧内容（保留 git）
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          # 创建目录结构
          mkdir -p singbox mihomo

          # 写入构建结果
          cp -r /tmp/release/singbox/* singbox/
          cp -r /tmp/release/mihomo/* mihomo/

          # 提交
          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Unified rule update $(date -u +%Y%m%d-%H%M%S)"
          git push origin release
