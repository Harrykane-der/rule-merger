name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ==================== 下载支持 version 5 的 sing-box ====================
      - name: Setup sing-box (support version 5)
        run: |
          curl -L -o sing-box https://github.com/DustinWin/proxy-tools/releases/download/sing-box/sing-box-ref1nd-testing-linux-amd64-v3.upx
          chmod +x sing-box
          sudo mv sing-box /usr/local/bin/sing-box
          sing-box version

      # ==================== 下载你的 JSON 规则 ====================
      - name: Download ablock.json
        run: |
          mkdir -p rule
          URL="https://github.com/Harrykane-der/my-rules/raw/refs/heads/main/ablock.json"
          curl -L -f -o rule/ablock.json "$URL" || { echo "❌ Download failed!"; exit 1; }
          echo "Downloaded: $(wc -l rule/ablock.json) lines"

      # ==================== JSON → SRS 转换 ====================
      - name: Convert to sing-box SRS (version 5)
        run: |
          echo "🔄 Converting ablock.json to .srs ..."
          
          sing-box rule-set compile \
            --output rule/ablock.srs \
            --version 5 \
            rule/ablock.json

          echo "✅ Conversion completed!"
          ls -lh rule/ablock.srs

      # ==================== 提交更新 ====================
      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git add rule/ablock.json rule/ablock.srs

          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update ablock rule-set - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Successfully updated and pushed"
          fi
