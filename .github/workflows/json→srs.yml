name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ==================== 安装 sing-box ====================
      - name: Setup sing-box v1.14.0-alpha.36
        run: |
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.36/sing-box-1.14.0-alpha.36-linux-amd64.tar.gz -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*-linux-amd64/sing-box /usr/local/bin/sing-box
          sing-box version

      # ==================== 下载 sing-box JSON 规则 ====================
      - name: Download ablock.json
        run: |
          mkdir -p rule
          URL="https://github.com/Harrykane-der/my-rules/raw/refs/heads/main/ablock.json"
          curl -L -f -o rule/ablock.json "$URL" || { echo "❌ Download failed!"; exit 1; }
          echo "Downloaded lines: $(wc -l rule/ablock.json)"

      # ==================== JSON → SRS 转换 ====================
      - name: Convert sing-box JSON to SRS
        run: |
          echo "🔄 Converting JSON to .srs ..."
          
          sing-box rule-set compile \
            --output rule/ablock.srs \
            rule/ablock.json

          echo "✅ Conversion completed successfully!"
          ls -lh rule/ablock.srs

      # ==================== 提交更新 ====================
      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git add rule/ablock.json rule/ablock.srs

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ablock rule-set - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Rules updated and pushed"
          fi
