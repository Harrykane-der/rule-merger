name: Compile Sing-box Rule Sets

on:
  push:
    branches: [ main, master ]
    paths:
      - 'local/**/*.json'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'local/**/*.json'
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 sing-box
        run: |
          wget -q https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-latest-linux-amd64.tar.gz -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: 编译 source → binary (.srs)
        run: |
          mkdir -p compiled-rules
          
          echo "开始查找并转换 .json 文件..."
          
          find local -type f -name "*.json" | while read -r json_file; do
            # 计算目标路径，保留目录结构
            srs_file="compiled-rules/${json_file#local/}"
            srs_file="${srs_file%.json}.srs"
            
            mkdir -p "$(dirname "$srs_file")"
            
            echo "转换: $json_file → $srs_file"
            sing-box rule-set compile --output "$srs_file" "$json_file"
          done

          echo "转换完成！生成的 .srs 文件："
          find compiled-rules -name "*.srs" | head -30 || echo "未找到 .srs 文件"
